<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | OMMFA</title>

  <link rel="icon" type="image/png" href="https://ommfa.org/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="https://ommfa.org/assets/images/favicon.png">

  <meta name="robots" content="noindex, follow">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .not-found-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="nav-mount"></div>

  <main class="not-found-container">
    <h1 style="font-size: 2rem; margin-bottom: 1rem;">404 - Nothing Here</h1>
    <p style="margin-bottom: 2rem; color: var(--ink-soft);">The page you are looking for has been moved or does not exist.</p>
    <a href="index.html" style="border-bottom: 1px solid var(--ink); color: var(--ink);">Return to Homepage</a>

  <div id="footer-mount"></div>
  <script src="js/site.js"></script>
