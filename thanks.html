<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you — OMMFA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .thanks-wrap { max-width: 50rem; margin: 18vh 0; padding: 0 6vw; }
    .thanks-wrap h1 {
      font-family: var(--font-sans); font-weight: 700; font-size: 22px;
      line-height: 1.25; letter-spacing: -0.01em; margin-bottom: 24px; color: var(--ink);
    }
    .thanks-wrap p { font-size: 15px; line-height: 1.7; margin: 0 0 16px 0; color: var(--ink); }
    .thanks-wrap a.back {
      display: inline-block; margin-top: 24px; font-size: 13px;
      color: var(--ink-soft); letter-spacing: 0.02em; transition: opacity 0.2s;
    }
    .thanks-wrap a.back:hover { opacity: 0.6; }
  </style>
</head>
<body class="page-thanks" data-page="thanks">

  <div id="nav-mount"></div>

  <main class="thanks-wrap">
    <h1>Thank you.</h1>
    <p>Your submission has reached us.</p>
    <p>We read everything. Submissions are reviewed on a rolling basis, and you'll hear back from us within 15 working days.</p>
    <p>In the meantime — thank you for trusting us with a turn in your work.</p>
    <a href="/" class="back">← Back to OMMFA</a>
  </main>

  <div id="footer-mount"></div>

  <script src="js/site.js"></script>
</body>
</html>
