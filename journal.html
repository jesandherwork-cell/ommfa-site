<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal | OMMFA Platform</title>


  <link rel="icon" type="image/png" href="https://ommfa.org/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="https://ommfa.org/assets/images/favicon.png">

  <meta property="og:image" content="https://ommfa.org/assets/images/og-default.webp">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="OMMFA">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://ommfa.org/assets/images/og-default.webp">

  <meta name="description" content="OMMFA is a not-for-profit, decentralised arts organisation based between London and Shanghai, working across exhibitions, publications, and projects.">
  <link rel="canonical" href="https://ommfa.org/journal" />
  <meta property="og:title" content="Journal | OMMFA Platform">
  <meta property="og:description" content="Field notes and research from OMMFA.">
  <meta property="og:url" content="https://ommfa.org/journal">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-journal" data-page="journal">

  <!-- 导航自动注入 -->
  <div id="nav-mount"></div>

  <!-- 筛选 + 排序栏 -->
  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">View</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Artist">Artist</button>
      <button class="filter-btn" data-filter="Art">Art</button>
      <button class="filter-btn" data-filter="Exhibition">Exhibition</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">Sort</span>
      <button class="sort-btn active" data-sort="time">By time <span class="sort-arrow">↓</span></button>
      <button class="sort-btn" data-sort="random">Random</button>
    </div>
  </div>

  <!-- 项目网格 -->
  <main class="grid" id="project-grid"></main>

  <!-- ===== 翻书遮罩层 ===== -->
  <div id="flipbook-overlay" class="flipbook-overlay" aria-hidden="true">
    <button class="flipbook-close" aria-label="Close">✕</button>
    <div class="flipbook-stage">
      <!-- 翻书库会把书渲染进这个 div -->
      <div id="flipbook" class="flipbook"></div>
    </div>
  </div>

  <!-- 页脚自动注入 -->
  <div id="footer-mount"></div>

  <!-- 翻书库 StPageFlip(jsdelivr CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script src="js/site.js"></script>
  <script src="js/journal-entries.js"></script>
  <script src="js/journal-flipbook.js"></script>
  <script src="js/journal.js"></script>
</body>
</html>
